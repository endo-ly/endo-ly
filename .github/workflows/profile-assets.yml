name: Generate Profile Assets

on:
  # 毎日0時（UTC）
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # コントリビューショングラフからスネークアニメーションを生成
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 外部APIからSVGをダウンロードしてキャッシュ（失敗時は既存を保持）
      - name: Download stats SVGs
        run: |
          download() {
            local url="$1"
            local file="$2"
            local tmp
            tmp=$(mktemp)
            if curl --fail --silent --show-error -o "$tmp" "$url"; then
              mv "$tmp" "dist/$file"
              echo "✓ $file"
            else
              echo "⚠ Failed: $file"
              rm -f "$tmp"
            fi
          }

          download "https://github-readme-stats.vercel.app/api?username=endo-ava&show_icons=true&theme=tokyonight&include_all_commits=true&count_private=true" "github-stats.svg"
          download "https://github-readme-stats.vercel.app/api/top-langs/?username=endo-ava&layout=compact&langs_count=8&theme=tokyonight" "top-langs.svg"
          download "https://github-profile-trophy.vercel.app/?username=endo-ava&theme=darkhub&no-frame=true&row=1&column=7" "trophy.svg"
          download "https://github-readme-stats.vercel.app/api/pin/?username=endo-ava&repo=music-theory-app&theme=tokyonight" "pin-music-theory-app.svg"
          download "https://github-readme-stats.vercel.app/api/pin/?username=endo-ava&repo=ego-graph&theme=tokyonight" "pin-ego-graph.svg"

      # 生成したファイルをoutputブランチにpush
      - name: Push assets to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
